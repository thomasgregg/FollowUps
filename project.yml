name: FollowUps
options:
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.thomasgregg.FollowUps
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: 5.10
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
packages: {}
targets:
  FollowUps:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Services
      - Features
      - Shortcuts
      - Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Resources/CallNotes-Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: FollowUps
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        PRODUCT_NAME: FollowUps
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: FollowUpsWidgetsExtension
    scheme:
      testTargets:
        - FollowUpsUnitTests
        - FollowUpsUITests

  FollowUpsWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      - LiveActivity
      - Models
      - Shortcuts
    settings:
      base:
        INFOPLIST_FILE: Resources/CallNotesWidgets-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.thomasgregg.FollowUps.widgets
        PRODUCT_NAME: FollowUpsWidgets
        INFOPLIST_KEY_CFBundleDisplayName: FollowUps Widgets
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - sdk: ActivityKit.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework

  FollowUpsUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/Unit
      - Models
      - Services
      - App/AppSettings.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thomasgregg.FollowUps.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/FollowUps.app/FollowUps
        BUNDLE_LOADER: $(TEST_HOST)
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: FollowUps

  FollowUpsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/UI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thomasgregg.FollowUps.uitests
        TEST_TARGET_NAME: FollowUps
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: FollowUps
